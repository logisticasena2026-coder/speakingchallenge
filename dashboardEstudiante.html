      function makeStore() {

        if (href === null) return;
        var isAnchor = href.startsWith('#') || href === '';
        if (isAnchor) {
          e.preventDefault();
          if (href === '' || href === '#') {
            window.scrollTo({ top: 0 });
            history.replaceState(null, '', ' ');

              location.hash = href;
            }
          }
