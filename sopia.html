<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-0": "#07090f",
                        "surface-1": "#0d1017",
                        "surface-2": "#121620",
                        "surface-3": "#181d2a",
                        "surface-4": "#1f2535",
                        "text-primary": "#f0ede8",
                        "text-secondary-alt": "#9ca3a0",
                        "text-muted-alt": "#5a6270",
                        "border-subtle": "rgba(255,255,255,0.06)",
                        "border-default": "rgba(255,255,255,0.10)",
                        "border-strong": "rgba(255,255,255,0.18)",
                        "brand-green": "#3dd68c",
                        "brand-amber": "#f5a623",
                        "brand-cyan": "#22d3ee",
                        "brand-purple": "#a855f7",
                        "primary": "#60f3a6",
                        "primary-container": "#3dd68c",
                        "primary-fixed": "#6bfdaf",
                        "primary-fixed-dim": "#49e095",
                        "secondary": "#ffb955",
                        "secondary-container": "#dc9100",
                        "secondary-fixed": "#ffddb4",
                        "secondary-fixed-dim": "#ffb955",
                        "tertiary": "#ffd0b1",
                        "tertiary-container": "#ffaa6c",
                        "tertiary-fixed": "#ffdcc6",
                        "tertiary-fixed-dim": "#ffb784",
                        "on-primary": "#003920",
                        "on-primary-fixed": "#002110",
                        "on-primary-container": "#005834",
                        "on-primary-fixed-variant": "#005230",
                        "on-secondary": "#452b00",
                        "on-secondary-fixed": "#291800",
                        "on-secondary-container": "#4f3100",
                        "on-secondary-fixed-variant": "#633f00",
                        "on-tertiary": "#4f2500",
                        "on-tertiary-fixed": "#301400",
                        "on-tertiary-container": "#783c05",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-surface": "#dde5dc",
                        "on-surface-variant": "#bbcabd",
                        "on-background": "#dde5dc",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "outline": "#869488",
                        "outline-variant": "#3c4a40",
                        "inverse-surface": "#dde5dc",
                        "inverse-on-surface": "#2b322c",
                        "inverse-primary": "#006d41",
                        "surface-dim": "#0e1510",
                        "surface-bright": "#333b35",
                        "surface-container-lowest": "#09100b",
                        "surface-container-low": "#161d18",
                        "surface-container": "#1a211c",
                        "surface-container-high": "#242c26",
                        "surface-container-highest": "#2f3731",
                        "surface-variant": "#2f3731",
                        "surface-tint": "#49e095",
                        "background": "#0e1510",
                        "surface": "#0e1510",
                        "era-viking-start": "#0a1628",
                        "era-viking-end": "#0d2a45",
                        "era-egypt-start": "#1a1200",
                        "era-egypt-end": "#5c3d00",
                        "era-rome-start": "#1a0808",
                        "era-rome-end": "#5c2020",
                        "era-cyber-start": "#0a0a1a",
                        "era-cyber-end": "#0a1628"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "ui-label": ["Inter"],
                        "body-standard": ["Space Grotesk"],
                        "body-large": ["Space Grotesk"],
                        "ui-badge": ["Inter"],
                        "h3-card": ["Cinzel"],
                        "h2-section": ["Cinzel"],
                        "h1-hero": ["Cinzel"]
                    },
                    "fontSize": {
                        "ui-label": ["14px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-standard": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-large": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "ui-badge": ["10px", { "letterSpacing": "0.08em", "fontWeight": "600" }],
                        "h3-card": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "h2-section": ["48px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "h1-hero": ["clamp(36px, 7vw, 80px)", { "lineHeight": "1.1", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>

</head>

<body class="font-body-standard text-on-surface min-h-screen flex flex-col mesh-gradient relative">
    <!-- Header -->
    <header class="border-b border-white/5 backdrop-blur-xl bg-surface-0/80 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
            <a href="#" class="text-text-muted-alt hover:text-brand-green transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-brand-green/20">
                    <span class="material-symbols-outlined text-brand-green" style="font-size: 18px;">radio</span>
                </div>
                <div>
                    <h1 class="text-sm font-semibold font-ui-label">Sophia Chat</h1>
                    <p class="text-xs text-text-muted-alt">Tiempo real</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Messages -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-8 overflow-y-auto">
        <div class="space-y-4">
            <!-- AI Message Example -->
            <div class="flex justify-start">
                <div class="max-w-[85%] px-5 py-3 rounded-2xl rounded-bl-md text-sm leading-relaxed message-ai">
                    Welcome back! Let's continue practicing your pronunciation. Today we'll focus on the vowel sounds in words like "enthusiasm" and "extraordinary". Ready when you are!
                </div>
            </div>
            <!-- User Message Example -->
            <div class="flex justify-end">
                <div class="max-w-[85%] px-5 py-3 rounded-2xl rounded-br-md text-sm leading-relaxed message-user">
                    Sure! I'll try my best with those words.
                </div>
            </div>
        </div>
    </main>

    <!-- Mic Button -->
    <footer class="border-t border-white/5 bg-surface-0/90 backdrop-blur-xl">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 flex justify-center">
            <button id="mic-btn" class="btn-mic w-16 h-16 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-2xl mic-pulse">mic</span>
            </button>
        </div>
    </footer>

    <script>
        const micBtn = document.getElementById('mic-btn');
        let isMicActive = false;

        micBtn.addEventListener('click', () => {
            isMicActive = !isMicActive;
            micBtn.classList.toggle('active', isMicActive);
        });
    </script>
</body>
</html>
