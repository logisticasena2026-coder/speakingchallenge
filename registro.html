    <style>
        .mesh-gradient {
            background-color: #07090f;
            background-image:
                radial-gradient(at 0% 0%, rgba(61, 214, 140, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(61, 214, 140, 0.05) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(13, 16, 23, 1) 0px, transparent 100%);
        }

        .glow-success {
            box-shadow: 0 0 40px rgba(61, 214, 140, 0.3);
        }

        .glass-panel {
            background: rgba(18, 22, 32, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>

<body
    class="bg-surface-0 text-text-primary font-body-standard overflow-hidden mesh-gradient min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <header
        class="bg-slate-950/80 backdrop-blur-md border-b border-emerald-500/20 shadow-2xl shadow-black/50 sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <div
                class="font-['Cinzel'] font-bold text-xl tracking-widest text-[#3dd68c] drop-shadow-[0_0_8px_rgba(61,214,140,0.5)]">
                CHRONO-LINGUA
            </div>
            <div class="flex items-center gap-4">
                <button
                    class="text-slate-400 hover:text-slate-200 transition-colors p-2 rounded-full hover:bg-emerald-500/10 transition-all duration-300">
                    <span class="material-symbols-outlined">help_outline</span>
                </button>
            </div>
        </div>
    </header>
    <!-- Main Canvas -->
    <main class="flex-grow flex items-center justify-center px-4 relative">
        <!-- Decorative background elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]">
            </div>
        </div>
        <section class="max-w-xl w-full text-center relative z-10">
            <!-- Glass Success Card -->
            <div class="glass-panel rounded-xl p-10 md:p-16 flex flex-col items-center gap-8 shadow-2xl">
                <!-- Success Icon Container -->
                <div class="relative">
                    <div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl animate-pulse"></div>
                    <div
                        class="relative w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-primary/30 flex items-center justify-center bg-surface-1/80 glow-success">
                        <span class="material-symbols-outlined text-primary text-6xl md:text-7xl"
                            style="font-variation-settings: 'FILL' 1;">
                            check_circle
                        </span>
                    </div>
                </div>
                <!-- Text Content -->
                <div class="space-y-4">
                    <h1
                        class="font-h1-hero text-primary uppercase tracking-[0.2em] drop-shadow-[0_0_12px_rgba(96,243,166,0.4)]">
                        Acceso Restaurado
                    </h1>
                    <p class="font-body-large text-text-secondary max-w-md mx-auto">
                        Tu clave ha sido actualizada con éxito. El portal está listo para tu siguiente viaje.
                    </p>
                </div>
                <!-- Primary Action -->
                <div class="w-full pt-4">
                    <button
                        class="group relative w-full bg-primary hover:bg-primary-fixed-dim text-on-primary font-bold py-4 px-8 rounded-lg transition-all duration-300 transform active:scale-95 shadow-[0_0_20px_rgba(96,243,166,0.3)] overflow-hidden">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                        </div>
                        <span class="relative z-10 font-ui-label text-base tracking-widest uppercase">Iniciar
                            Sesión</span>
                    </button>
                </div>
                <!-- Secondary Narrative Context -->
                <div class="flex items-center gap-3 text-text-muted opacity-60">
                    <span class="h-px w-8 bg-border-default"></span>
                    <p class="text-xs uppercase tracking-tighter font-ui-badge">Sincronización de Archivo Completa</p>
                    <span class="h-px w-8 bg-border-default"></span>
                </div>
            </div>
            <!-- Background Asset -->
            <div class="mt-12 opacity-30">
                <div class="flex justify-center gap-8">
                    <div class="w-2 h-2 rounded-full bg-primary"></div>
                    <div class="w-2 h-2 rounded-full bg-primary/40"></div>
                    <div class="w-2 h-2 rounded-full bg-primary/20"></div>
                </div>
            </div>
        </section>
    </main>
    <!-- Visual Anchor Background Decoration -->
    <div class="fixed inset-0 z-[-1] opacity-20">
        <div class="absolute bottom-0 left-0 w-full h-full"
            data-alt="A cinematic, high-tech control room environment with holographic green light interfaces and historical artifact outlines floating in a dark, atmospheric void. The aesthetic is a blend of futuristic spaceship technology and ancient library mystery, utilizing deep emerald and slate tones. Soft neon glows emanate from digital runes, creating a sense of restored order and technical precision in a dark-mode game interface background."
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDR43dswmlKrflpRJCQylMtoMbv0MQfw2OkZr_KJtG8DSLoJbuQXxNcSc1mAxl_S5usps4pS4KHSiwGyEZEH_sPou5njK3t6rA25U-gWWIEAyFZf81VYZ8a43Q7n-Ew3bdNXOoXKyxn06c1zkJUNgDGIL-NDq0pAySLRlfI86g3TPI381A3IeWjAlnWA2XZI5y4ZMjeM7PByPazZG7Do72zxZOR_OR9ecrRnFDqOWzK4rd6v7N2IEOMJnLTVV6srOcBZd-hbc90oPeJ'); background-size: cover; background-position: center;">
        </div>
    </div>
    <!-- BottomNavBar (Suppressed for focused Transactional screen as per mandate, but structure shown for shell integrity if needed by context) -->
    <!-- Navigation suppressed to prioritize focus on the success message -->

</html>
