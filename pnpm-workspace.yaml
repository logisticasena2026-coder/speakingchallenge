minimumReleaseAge: 10080
trustPolicy: no-downgrade
allowBuilds:
  '@google/genai': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
onlyBuiltDependencies:
  - '@google/genai'
  - '@prisma/engines'
  - esbuild
  - msgpackr-extract
  - msw
  - prisma
  - protobufjs
